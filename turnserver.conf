# coturn configuration for the RemoteDesktop TURN relay.
#
# The shared-secret + realm + (optional) external-ip below MUST be edited for
# your deployment. The static-auth-secret value here MUST match the backend's
# `Turn:Secret` (env: `TURN_SECRET`) — that's how the server-issued ephemeral
# credentials validate against coturn.
#
# coturn does NOT expand $env vars in this file. If you don't want plaintext
# secrets at rest, run an envsubst step at deploy time, mount the conf as a
# secret, or pass the dynamic values via the compose `command:` instead.

# Listen on the standard TURN ports. UDP is preferred for media; TCP is the
# fallback when the client's network blocks UDP.
listening-port=3478
tls-listening-port=5349

# UDP relay port range — keep narrow so port-forwarding rules stay manageable.
# 100 ports is plenty for 10 concurrent streams (each peer pair uses ~2).
min-port=49152
max-port=49252

# Authentication: time-limited ephemeral credentials minted by the backend
# (HMAC-SHA1 over `<expiry>:<subject>`). The static secret is the symmetric
# key used to validate them.
use-auth-secret
static-auth-secret=REPLACE_ME_WITH_TURN_SECRET

# Realm appears in the TURN protocol handshake. Use the public hostname so
# coturn's logs and any client-side diagnostics name your deployment, not the
# generic "coturn".
realm=example.com

# Public IP your home router exposes for inbound TURN traffic. Required because
# the host inside the LAN sees a private IP, but ICE candidates need the public
# address so remote browsers can reach the relay. Format: <public>/<private>
# when both are needed; <public> alone is enough for most home setups.
#
# external-ip=YOUR_PUBLIC_IP

# Hardening
no-multicast-peers
cli=0
fingerprint
stale-nonce=600

# TLS — uncomment + point at the Cloudflare Origin Certificate when you
# enable TURNS (5349). Plain TURN (3478) already gets DTLS-SRTP for the media
# itself; TURNS only encrypts the control channel.
cert=/etc/coturn/certs/origin.pem
pkey=/etc/coturn/certs/origin-key.pem

# Reject relay attempts to the LAN itself — defence-in-depth against an
# attacker using your TURN as a pivot into your home network.
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
allowed-peer-ip=0.0.0.0-255.255.255.255
