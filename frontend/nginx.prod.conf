# nginx config selected at container start when /etc/nginx/certs/origin.pem
# is present (mounted from the compose `./certs/` directory). Terminates TLS
# with the Cloudflare Origin Certificate; Cloudflare's edge speaks HTTPS to
# this origin under Full (Strict) mode.

# Plain HTTP only redirects — Cloudflare itself handles HTTP→HTTPS for end
# users, but the redirect here is useful for direct LAN testing.
server {
    listen 80;
    listen [::]:80;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS — Cloudflare also sets this at the edge, but defence-in-depth.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # SPA — serve index.html for all routes
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Cloudflare's real visitor IP arrives in CF-Connecting-IP; forwarded
        # so any future per-visitor logic (logging, future rate limiting, etc.)
        # can attribute requests correctly behind the proxy.
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    }

    location /hubs/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_read_timeout 86400;
    }
}
